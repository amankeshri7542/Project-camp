<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ── DESIGN TOKENS ── */
const C = {
  bg:            '#0A0A0F',
  surface:       '#111118',
  surface2:      '#1A1A24',
  border:        '#2A2A3A',
  borderHover:   '#3A3A4A',
  accent:        '#6366F1',
  accentHover:   '#7577F3',
  accentGlow:    'rgba(99,102,241,0.15)',
  textPrimary:   '#F0F0FF',
  textSecondary: '#8B8BA7',
  success:       '#22C55E',
  warning:       '#F59E0B',
  danger:        '#EF4444',
  dangerHover:   '#F56565',
};

const ThemeContext = React.createContext(C);
const useC = () => React.useContext(ThemeContext);

/* ── GLOBAL CSS ── */
(() => {
  const s = document.createElement('style');
  s.textContent = `
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A0A0F;
      color: #F0F0FF;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    input, textarea, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2A2A3A; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #3A3A4A; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  `;
  document.head.appendChild(s);
})();

/* ── API HELPER ── */
const api = async (method, path, body) => {
  const opts = { method, credentials: 'include', headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`/api/v1${path}`, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || 'Request failed');
  return json.data;
};

const toUserShape = u => u ? ({
  _id: u._id,
  name: u.fullName || u.username || 'User',
  email: u.email || '',
  bio: u.bio || '',
  username: u.username || '',
  initials: (u.fullName || u.username || 'U').trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0, 2).join(''),
  joinedAt: u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : '',
}) : null;

const toProjectShape = p => p ? ({
  id: p._id,
  _id: p._id,
  name: p.name,
  description: p.description || '',
  status: p.status || 'todo',
  priority: 'medium',
  updatedAt: p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '',
  tasks: 0,
  completed: 0,
}) : null;

const STATUS_CFG = {
  todo:        { label: 'Todo',        bg: '#1E1E2E', color: '#8B8BA7' },
  in_progress: { label: 'In Progress', bg: '#1C1B3A', color: '#6366F1' },
  done:        { label: 'Done',        bg: '#0F2A1A', color: '#22C55E' },
};

const PRIORITY_CFG = {
  low:    { label: 'Low',    bg: '#14532D', color: '#22C55E' },
  medium: { label: 'Medium', bg: '#78350F', color: '#F59E0B' },
  high:   { label: 'High',   bg: '#7F1D1D', color: '#EF4444' },
};

/* ── LOGO ── */
function Logo({ size = 'md' }) {
  const c = useC();
  const sz = size === 'sm' ? 20 : size === 'lg' ? 32 : 26;
  const ts = size === 'sm' ? 13 : size === 'lg' ? 20 : 15;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, userSelect: 'none', flexShrink: 0 }}>
      <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 21h20L12 2z" fill={c.accent} />
        <path d="M12 9v7M9.5 14.5h5" stroke="white" strokeWidth="1.6" strokeLinecap="round" />
      </svg>
      <span style={{ fontSize: ts, fontWeight: 600, color: c.textPrimary, letterSpacing: '-0.025em' }}>
        Project<span style={{ color: c.accent }}>Camp</span>
      </span>
    </div>
  );
}

/* ── ICON ── */
function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 1.5 }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round', style: { display: 'block', flexShrink: 0 } };
  const paths = {
    folder:    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>,
    activity:  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
    check:     <polyline points="20 6 9 17 4 12"/>,
    clock:     <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    grid:      <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
    briefcase: <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></>,
    user:      <><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    logout:    <><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    search:    <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    plus:      <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    edit:      <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:     <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    x:         <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    chevL:     <polyline points="15 18 9 12 15 6"/>,
    chevR:     <polyline points="9 18 15 12 9 6"/>,
    chevD:     <polyline points="6 9 12 15 18 9"/>,
    menu:      <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    arrowUR:   <><path d="M7 17L17 7"/><path d="M7 7h10v10"/></>,
    users:     <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>,
    zap:       <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
    mail:      <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    lock:      <><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></>,
    eye:       <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    target:    <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
    hash:      <><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>,
  };
  return <svg {...p}>{paths[name]}</svg>;
}

/* ── BADGES ── */
function StatusBadge({ status }) {
  const cfg = STATUS_CFG[status] || STATUS_CFG.todo;
  return (
    <span style={{ background: cfg.bg, color: cfg.color, borderRadius: 20, fontSize: 11, padding: '3px 10px', fontWeight: 500, whiteSpace: 'nowrap', display: 'inline-block', letterSpacing: '0.01em' }}>
      {cfg.label}
    </span>
  );
}

function PriorityBadge({ priority }) {
  const cfg = PRIORITY_CFG[priority] || PRIORITY_CFG.low;
  return (
    <span style={{ background: cfg.bg, color: cfg.color, borderRadius: 20, fontSize: 11, padding: '3px 10px', fontWeight: 500, whiteSpace: 'nowrap', display: 'inline-block', letterSpacing: '0.01em' }}>
      {cfg.label}
    </span>
  );
}

/* ── BTN ── */
function Btn({ variant = 'primary', children, onClick, disabled, loading, style: xs, size = 'md', fullWidth }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  const pad = { sm: '6px 12px', md: '8px 16px', lg: '10px 20px' }[size] || '8px 16px';
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    borderRadius: 6, fontSize: 14, fontWeight: 500,
    cursor: disabled || loading ? 'not-allowed' : 'pointer',
    border: '1px solid transparent',
    transition: 'all 0.15s ease',
    padding: pad,
    opacity: disabled ? 0.5 : 1,
    transform: hov && !disabled && !loading ? 'scale(1.01)' : 'scale(1)',
    whiteSpace: 'nowrap',
    width: fullWidth ? '100%' : undefined,
    letterSpacing: '-0.01em',
    ...xs,
  };
  if (variant === 'primary') Object.assign(base, { background: hov ? c.accentHover : c.accent, color: '#fff' });
  if (variant === 'ghost')   Object.assign(base, { background: hov ? c.accentGlow : 'transparent', color: c.accent, borderColor: c.accent });
  if (variant === 'danger')  Object.assign(base, { background: hov ? c.dangerHover : c.danger, color: '#fff' });
  if (variant === 'surface') Object.assign(base, { background: hov ? c.surface2 : c.surface, color: c.textSecondary, borderColor: c.border });

  return (
    <button style={base} onClick={disabled || loading ? undefined : onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
      {loading && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ animation: 'spin 0.7s linear infinite', flexShrink: 0 }}><path d="M12 3a9 9 0 0 1 9 9"/><path d="M21 12a9 9 0 01-9 9M3 12a9 9 0 019-9" strokeOpacity="0.3"/></svg>}
      {children}
    </button>
  );
}

/* ── FORM CONTROLS ── */
function FormInput({ label, value, onChange, type = 'text', placeholder, disabled, autoFocus, onKeyDown, style: xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, ...xs }}>
      {label && <label style={{ fontSize: 12, color: c.textSecondary, fontWeight: 500 }}>{label}</label>}
      <input type={type} value={value} onChange={e => onChange && onChange(e.target.value)}
        placeholder={placeholder} disabled={disabled} autoFocus={autoFocus} onKeyDown={onKeyDown}
        onFocus={() => setFoc(true)} onBlur={() => setFoc(false)}
        style={{ background: c.surface2, border: `1px solid ${foc ? c.accent : c.border}`, borderRadius: 6, padding: '10px 12px', color: disabled ? c.textSecondary : c.textPrimary, fontSize: 14, outline: 'none', width: '100%', boxShadow: foc ? '0 0 0 3px rgba(99,102,241,0.15)' : 'none', transition: 'border-color 0.15s, box-shadow 0.15s', opacity: disabled ? 0.6 : 1 }} />
    </div>
  );
}

function FormTextarea({ label, value, onChange, placeholder, rows = 3, style: xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, ...xs }}>
      {label && <label style={{ fontSize: 12, color: c.textSecondary, fontWeight: 500 }}>{label}</label>}
      <textarea value={value} onChange={e => onChange && onChange(e.target.value)}
        placeholder={placeholder} rows={rows}
        onFocus={() => setFoc(true)} onBlur={() => setFoc(false)}
        style={{ background: c.surface2, border: `1px solid ${foc ? c.accent : c.border}`, borderRadius: 6, padding: '10px 12px', color: c.textPrimary, fontSize: 14, outline: 'none', width: '100%', resize: 'vertical', minHeight: 80, boxShadow: foc ? '0 0 0 3px rgba(99,102,241,0.15)' : 'none', transition: 'border-color 0.15s, box-shadow 0.15s', fontFamily: 'Inter, sans-serif', lineHeight: 1.6 }} />
    </div>
  );
}

function FormSelect({ label, value, onChange, options, style: xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, ...xs }}>
      {label && <label style={{ fontSize: 12, color: c.textSecondary, fontWeight: 500 }}>{label}</label>}
      <div style={{ position: 'relative' }}>
        <select value={value} onChange={e => onChange && onChange(e.target.value)}
          onFocus={() => setFoc(true)} onBlur={() => setFoc(false)}
          style={{ background: c.surface2, border: `1px solid ${foc ? c.accent : c.border}`, borderRadius: 6, padding: '10px 36px 10px 12px', color: c.textPrimary, fontSize: 14, outline: 'none', width: '100%', cursor: 'pointer', boxShadow: foc ? '0 0 0 3px rgba(99,102,241,0.15)' : 'none', transition: 'border-color 0.15s, box-shadow 0.15s', appearance: 'none', WebkitAppearance: 'none' }}>
          {options.map(o => <option key={o.value} value={o.value} style={{ background: '#1A1A24', color: '#F0F0FF' }}>{o.label}</option>)}
        </select>
        <div style={{ position: 'absolute', right: 11, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }}>
          <Icon name="chevD" size={13} color={c.textSecondary} />
        </div>
      </div>
    </div>
  );
}

/* ── CONFIRM DIALOG ── */
function ConfirmDialog({ title, message, onConfirm, onCancel }) {
  const c = useC();
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 300, animation: 'fadeIn 0.15s ease', padding: 20 }}>
      <div style={{ background: c.surface2, border: `1px solid ${c.border}`, borderRadius: 8, padding: 24, width: '100%', maxWidth: 380, animation: 'fadeSlideUp 0.2s ease' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: 'rgba(239,68,68,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="trash" size={15} color={c.danger} />
          </div>
          <h3 style={{ fontSize: 15, fontWeight: 500, color: c.textPrimary }}>{title || 'Confirm Delete'}</h3>
        </div>
        <p style={{ fontSize: 13, color: c.textSecondary, marginBottom: 20, lineHeight: 1.65, paddingLeft: 42 }}>{message}</p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <Btn variant="surface" size="sm" onClick={onCancel}>Cancel</Btn>
          <Btn variant="danger"  size="sm" onClick={onConfirm}>Delete project</Btn>
        </div>
      </div>
    </div>
  );
}

/* ── DONUT CHART ── */
function DonutChart({ projects }) {
  const c = useC();
  const total  = projects.length;
  if (!total) return <div style={{ height: 110, display: 'flex', alignItems: 'center', justifyContent: 'center', color: c.textSecondary, fontSize: 13 }}>No data</div>;
  const done   = projects.filter(p => p.status === 'done').length;
  const inProg = projects.filter(p => p.status === 'in_progress').length;
  const todo   = projects.filter(p => p.status === 'todo').length;
  const size = 110, r = 38, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  const segs = [
    { count: done,   color: c.success },
    { count: inProg, color: c.accent  },
    { count: todo,   color: c.border  },
  ];
  let cum = 0;
  const arcs = segs.map(seg => {
    const len = (seg.count / total) * circ;
    const off = circ - cum;
    cum += len;
    return { ...seg, len, off };
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
      <svg width={size} height={size} style={{ flexShrink: 0 }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={c.surface2} strokeWidth={8} />
        {arcs.map((arc, i) => arc.len > 0.5 ? (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={arc.color} strokeWidth={8}
            strokeDasharray={`${arc.len} ${circ - arc.len}`} strokeDashoffset={arc.off}
            style={{ transform: 'rotate(-90deg)', transformOrigin: `${cx}px ${cy}px` }} />
        ) : null)}
        <text x={cx} y={cy - 3} textAnchor="middle" dominantBaseline="middle" fill="#F0F0FF" fontSize="18" fontWeight="600" fontFamily="Inter">{total}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fill="#8B8BA7" fontSize="10" fontFamily="Inter">projects</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
        {[{ label: 'Done', count: done, color: c.success }, { label: 'In Progress', count: inProg, color: c.accent }, { label: 'Todo', count: todo, color: c.textSecondary }].map(item => (
          <div key={item.label} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 7, height: 7, borderRadius: '50%', background: item.color, flexShrink: 0 }} />
            <span style={{ fontSize: 12, color: c.textSecondary, minWidth: 76 }}>{item.label}</span>
            <span style={{ fontSize: 12, color: c.textPrimary, fontWeight: 600 }}>{item.count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── EMPTY STATE ── */
function EmptyState({ title, description, action, onAction }) {
  const c = useC();
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '72px 20px', gap: 16 }}>
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect x="6" y="14" width="44" height="34" rx="4" stroke={c.border} strokeWidth="1.5" />
        <path d="M6 22h44" stroke={c.border} strokeWidth="1.5" />
        <path d="M20 14v-3a2 2 0 012-2h12a2 2 0 012 2v3" stroke={c.border} strokeWidth="1.5" />
        <circle cx="28" cy="36" r="7" stroke={c.borderHover} strokeWidth="1.5" />
        <path d="M28 32v4l2.5 1.5" stroke={c.borderHover} strokeWidth="1.5" strokeLinecap="round" />
      </svg>
      <div style={{ textAlign: 'center', maxWidth: 300 }}>
        <p style={{ fontSize: 15, fontWeight: 500, color: c.textPrimary, marginBottom: 6 }}>{title}</p>
        <p style={{ fontSize: 13, color: c.textSecondary, lineHeight: 1.65 }}>{description}</p>
      </div>
      {action && <Btn variant="primary" onClick={onAction} style={{ marginTop: 4 }}><Icon name="plus" size={14} color="white" />{action}</Btn>}
    </div>
  );
}

/* ── SIDEBAR ── */
const NAV_ITEMS = [
  { id: 'dashboard', label: 'Dashboard', icon: 'grid' },
  { id: 'projects',  label: 'Projects',  icon: 'briefcase' },
  { id: 'profile',   label: 'Profile',   icon: 'user' },
];

function NavItem({ item, isActive, collapsed, onClick }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      title={collapsed ? item.label : undefined}
      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: collapsed ? '10px 0' : '9px 11px', borderRadius: 6, border: 'none', background: (isActive || hov) ? c.accentGlow : 'transparent', color: isActive ? c.accent : (hov ? c.textPrimary : c.textSecondary), cursor: 'pointer', transition: 'all 0.15s ease', width: '100%', justifyContent: collapsed ? 'center' : 'flex-start', position: 'relative', fontSize: 14, fontWeight: isActive ? 500 : 400, letterSpacing: '-0.01em', fontFamily: 'Inter, sans-serif' }}>
      <div style={{ position: 'absolute', left: 0, top: '18%', width: 2, height: '64%', background: c.accent, borderRadius: '0 2px 2px 0', opacity: isActive ? 1 : 0, transition: 'opacity 0.15s ease' }} />
      <Icon name={item.icon} size={16} color={isActive ? c.accent : (hov ? c.textPrimary : c.textSecondary)} />
      {!collapsed && <span>{item.label}</span>}
    </button>
  );
}

function Sidebar({ page, navigate, user, collapsed, setCollapsed, onLogout }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  return (
    <aside style={{ width: collapsed ? 60 : 220, flexShrink: 0, background: c.surface, borderRight: `1px solid ${c.border}`, display: 'flex', flexDirection: 'column', transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)', overflow: 'hidden', position: 'relative', zIndex: 10, height: '100%' }}>

function RegisterPage({ navigate, onLogin }) {
  const c = useC();
  const [form, setForm]       = React.useState({ name: '', email: '', password: '' });
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState('');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = async () => {
    if (!form.name || !form.username || !form.email || !form.password) { setError('Please fill in all fields.'); return; }
    if (form.password.length < 8) { setError('Password must be at least 8 characters.'); return; }
    setError(''); setLoading(true);
    try {
      await api('POST', '/auth/register', { fullName: form.name, username: form.username.toLowerCase(), email: form.email, password: form.password });
      const data = await api('POST', '/auth/login', { email: form.email, password: form.password });
      onLogin(toUserShape(data.user));
    } catch (e) {
      setError(e.message || 'Registration failed. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <AuthLayout>
      <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, padding: 32 }}>
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 20 }}><Logo size="md" /></div>
          <h1 style={{ fontSize: 20, fontWeight: 500, color: c.textPrimary, letterSpacing: '-0.02em', marginBottom: 6 }}>Create your account</h1>
          <p style={{ fontSize: 13, color: c.textSecondary }}>Start managing projects with your team.</p>
        </div>
        <ErrorAlert msg={error} />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <FormInput label="Full name" value={form.name} onChange={v => set('name', v)} placeholder="Alex Morgan" />
          <FormInput label="Username" value={form.username || ''} onChange={v => set('username', v)} placeholder="alexmorgan" />
          <FormInput label="Email" type="email" value={form.email} onChange={v => set('email', v)} placeholder="you@company.com" />
          <FormInput label="Password" type="password" value={form.password} onChange={v => set('password', v)} placeholder="At least 8 characters" onKeyDown={e => e.key === 'Enter' && submit()} />
          <div style={{ background: c.surface2, borderRadius: 6, padding: '10px 12px', display: 'flex', gap: 8, marginTop: 2 }}>
            <Icon name="lock" size={13} color={c.textSecondary} />
            <span style={{ fontSize: 12, color: c.textSecondary, lineHeight: 1.5 }}>Your data is encrypted and never shared with third parties.</span>
          </div>
          <Btn variant="primary" fullWidth loading={loading} onClick={submit} style={{ marginTop: 4 }}>
            {loading ? 'Creating account…' : 'Create account'}
          </Btn>
        </div>
        <div style={{ marginTop: 24, paddingTop: 20, borderTop: `1px solid ${c.border}`, textAlign: 'center' }}>
          <p style={{ fontSize: 13, color: c.textSecondary }}>Already have an account?{' '}
            <button onClick={() => navigate('login')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: c.accent, fontSize: 13, fontWeight: 500, padding: 0 }}>Sign in</button>
          </p>
        </div>
      </div>
    </AuthLayout>
  );
}

  const c = useC();
  const [hov, setHov] = React.useState(false);
  const pct = project.tasks > 0 ? Math.round((project.completed / project.tasks) * 100) : 0;
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: c.surface, border: `1px solid ${hov ? c.borderHover : c.border}`, borderRadius: 8, padding: 20, display: 'flex', flexDirection: 'column', gap: 12, transition: 'border-color 0.15s, transform 0.15s', transform: hov ? 'translateY(-2px)' : 'none', position: 'relative' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
        <h3 style={{ fontSize: 15, fontWeight: 500, color: c.textPrimary, lineHeight: 1.4, flex: 1, letterSpacing: '-0.015em' }}>{project.name}</h3>
        <div style={{ display: 'flex', gap: 2, opacity: hov ? 1 : 0, transition: 'opacity 0.15s', flexShrink: 0, marginTop: 1 }}>
          <IconBtn icon="edit"  onClick={onEdit}   title="Edit project" />
          <IconBtn icon="trash" onClick={onDelete} title="Delete project" danger />
        </div>
      </div>
      <p style={{ fontSize: 13, color: c.textSecondary, lineHeight: 1.65, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{project.description}</p>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <StatusBadge status={project.status} />
        <PriorityBadge priority={project.priority} />
      </div>
      {project.tasks > 0 && (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
            <span style={{ fontSize: 11, color: c.textSecondary }}>{project.completed}/{project.tasks} tasks</span>
            <span style={{ fontSize: 11, color: c.textSecondary }}>{pct}%</span>
          </div>
          <div style={{ height: 3, background: c.surface2, borderRadius: 4, overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${pct}%`, background: project.status === 'done' ? c.success : c.accent, borderRadius: 4, transition: 'width 0.4s ease' }} />
          </div>
        </div>
      )}
      <div style={{ paddingTop: 4, borderTop: `1px solid ${c.border}`, display: 'flex', justifyContent: 'flex-end' }}>
        <span style={{ fontSize: 11, color: c.textSecondary, fontFamily: 'JetBrains Mono, monospace' }}>Updated {project.updatedAt}</span>
      </div>
    </div>
  );
}

function ProjectModal({ mode, project, onSave, onClose }) {
  const c = useC();
  const [form, setForm]       = React.useState({ name: project?.name || '', description: project?.description || '', status: project?.status || 'todo', priority: project?.priority || 'medium' });
  const [loading, setLoading] = React.useState(false);
  const [errors, setErrors]   = React.useState({});
  const set = (k, v) => { setForm(f => ({ ...f, [k]: v })); setErrors(e => ({ ...e, [k]: null })); };

  const handleSave = async () => {
    const errs = {};
    if (!form.name.trim()) errs.name = 'Project name is required.';
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setLoading(true);
    try {
      await onSave(form);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, animation: 'fadeIn 0.15s ease', padding: 20 }}>
      <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, width: '100%', maxWidth: 520, animation: 'fadeSlideUp 0.22s ease', overflow: 'hidden' }}>
        <div style={{ padding: '18px 24px', borderBottom: `1px solid ${c.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h2 style={{ fontSize: 15, fontWeight: 500, color: c.textPrimary, letterSpacing: '-0.01em' }}>{mode === 'new' ? 'New Project' : 'Edit Project'}</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', borderRadius: 4 }}><Icon name="x" size={16} color={c.textSecondary} /></button>
        </div>
        <div style={{ padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <FormInput label="Project Name" value={form.name} onChange={v => set('name', v)} placeholder="e.g. E-commerce Redesign" autoFocus />
            {errors.name && <p style={{ fontSize: 12, color: c.danger, marginTop: 5 }}>{errors.name}</p>}
          </div>
          <FormTextarea label="Description" value={form.description} onChange={v => set('description', v)} placeholder="Brief description of the project scope and goals…" rows={3} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <FormSelect label="Status"   value={form.status}   onChange={v => set('status', v)}   options={STATUS_OPTS} />
            <FormSelect label="Priority" value={form.priority} onChange={v => set('priority', v)} options={PRIORITY_OPTS} />
          </div>
        </div>
        <div style={{ padding: '14px 24px', borderTop: `1px solid ${c.border}`, display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <Btn variant="surface" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" loading={loading} onClick={handleSave}>{loading ? 'Saving…' : mode === 'new' ? 'Create Project' : 'Save Changes'}</Btn>
        </div>
      </div>
    </div>
  );
}

function ProjectsPage({ projects, setProjects }) {
  const c = useC();
  const [filter, setFilter]   = React.useState('all');
  const [search, setSearch]   = React.useState('');
  const [modal, setModal]     = React.useState(null);
  const [confirm, setConfirm] = React.useState(null);
  const [searchFoc, setSearchFoc] = React.useState(false);
  const [apiErr, setApiErr]   = React.useState('');

  const filtered = React.useMemo(() =>
    projects
      .filter(p => filter === 'all' || p.status === filter)
      .filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase()) || (p.description || '').toLowerCase().includes(search.toLowerCase())),
    [projects, filter, search]
  );

  const getCount = id => id === 'all' ? projects.length : projects.filter(p => p.status === id).length;

  const handleSave = async data => {
    try {
      if (modal.mode === 'new') {
        const created = await api('POST', '/projects', { name: data.name, description: data.description });
        setProjects(prev => [toProjectShape(created), ...prev]);
      } else {
        const updated = await api('PUT', `/projects/${modal.project._id}`, { name: data.name, description: data.description });
        setProjects(prev => prev.map(p => p._id === modal.project._id ? toProjectShape(updated) : p));
      }
      setModal(null);
    } catch (e) {
      setApiErr(e.message);
    }
  };

  const handleDelete = async id => {
    try {
      await api('DELETE', `/projects/${id}`);
      setProjects(prev => prev.filter(p => p._id !== id));
      setConfirm(null);
    } catch (e) {
      setApiErr(e.message);
      setConfirm(null);
    }
  };

  return (
    <div style={{ padding: 32, maxWidth: 1160, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 500, color: c.textPrimary, letterSpacing: '-0.025em', marginBottom: 3 }}>My Projects</h1>
          <p style={{ fontSize: 13, color: c.textSecondary }}>{projects.length} total · {projects.filter(p => p.status === 'in_progress').length} active</p>
        </div>
        <Btn variant="primary" onClick={() => setModal({ mode: 'new' })}><Icon name="plus" size={14} color="white" />New Project</Btn>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 22, gap: 12, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {FILTER_TABS.map(tab => <FilterPill key={tab.id} tab={tab} active={filter === tab.id} onClick={() => setFilter(tab.id)} count={getCount(tab.id)} />)}
        </div>
        <div style={{ position: 'relative', minWidth: 210 }}>
          <div style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }}><Icon name="search" size={13} color={c.textSecondary} /></div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search projects…"
            onFocus={() => setSearchFoc(true)} onBlur={() => setSearchFoc(false)}
            style={{ background: c.surface2, border: `1px solid ${searchFoc ? c.accent : c.border}`, borderRadius: 6, padding: '7px 12px 7px 30px', color: c.textPrimary, fontSize: 13, outline: 'none', width: '100%', transition: 'border-color 0.15s', boxShadow: searchFoc ? '0 0 0 3px rgba(99,102,241,0.12)' : 'none', fontFamily: 'Inter, sans-serif' }} />
        </div>
      </div>

      {filtered.length === 0 ? (
        <EmptyState
          title={search ? 'No projects match your search' : 'No projects yet'}
          description={search ? 'Try a different keyword or clear the search.' : 'Create your first project to start managing tasks and tracking progress.'}
          action={!search ? 'Create first project' : undefined}
          onAction={() => setModal({ mode: 'new' })}
        />
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 14 }}>
          {filtered.map(proj => (
            <ProjectCard key={proj.id} project={proj}
              onEdit={() => setModal({ mode: 'edit', project: proj })}
              onDelete={() => setConfirm(proj._id || proj.id)} />
          ))}
        </div>
      )}

      {modal   && <ProjectModal mode={modal.mode} project={modal.project} onSave={handleSave} onClose={() => setModal(null)} />}
      {confirm && <ConfirmDialog title="Delete project?" message="This will permanently delete the project and all its tasks. This action cannot be undone." onConfirm={() => handleDelete(confirm)} onCancel={() => setConfirm(null)} />}
      {apiErr  && <div style={{ position: 'fixed', bottom: 20, right: 20, background: 'rgba(239,68,68,0.12)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 6, padding: '10px 16px', color: C.danger, fontSize: 13, zIndex: 500, display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="x" size={13} color={C.danger} />{apiErr}<button onClick={() => setApiErr('')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.danger, marginLeft: 4 }}>✕</button></div>}
    </div>
  );
}

/* ── PROFILE PAGE ── */
function ProfilePage({ user, setUser }) {
  const c = useC();
  const [form, setForm]       = React.useState({ name: user.name, bio: user.bio });
  const [loading, setLoading] = React.useState(false);
  const [saved, setSaved]     = React.useState(false);
  const set = (k, v) => { setForm(f => ({ ...f, [k]: v })); setSaved(false); };

  const handleSave = async () => {
    if (!form.name.trim()) return;
    setLoading(true);
    await new Promise(r => setTimeout(r, 400));
    const initials = form.name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0, 2).join('');
    setUser(u => ({ ...u, name: form.name.trim(), bio: form.bio, initials }));
    setLoading(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  return (
    <div style={{ padding: 32, maxWidth: 1160, margin: '0 auto' }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 24, fontWeight: 500, color: c.textPrimary, letterSpacing: '-0.025em', marginBottom: 4 }}>Profile</h1>
        <p style={{ fontSize: 13, color: c.textSecondary }}>Manage your account settings and personal information.</p>
      </div>
      <div style={{ maxWidth: 580 }}>
        <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, padding: 24, marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
            <div style={{ width: 72, height: 72, borderRadius: '50%', background: `linear-gradient(135deg, ${c.accent}80, ${c.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, fontWeight: 700, color: 'white', flexShrink: 0, letterSpacing: '0.04em', boxShadow: `0 0 0 4px ${c.accentGlow}` }}>{user.initials}</div>
            <div>
              <div style={{ fontSize: 18, fontWeight: 500, color: c.textPrimary, letterSpacing: '-0.02em', marginBottom: 4 }}>{user.name}</div>
              <div style={{ fontSize: 13, color: c.textSecondary, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 5 }}><Icon name="mail" size={12} color={c.textSecondary} />{user.email}</div>
              <div style={{ fontSize: 12, color: c.textSecondary, display: 'flex', alignItems: 'center', gap: 5 }}><Icon name="clock" size={12} color={c.textSecondary} />Joined {user.joinedAt}</div>
            </div>
          </div>
          {user.bio && <p style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${c.border}`, fontSize: 13, color: c.textSecondary, lineHeight: 1.65 }}>{user.bio}</p>}
        </div>

        <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, padding: 24 }}>
          <h2 style={{ fontSize: 14, fontWeight: 500, color: c.textPrimary, marginBottom: 20, letterSpacing: '-0.01em' }}>Edit Profile</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <FormInput label="Full Name" value={form.name} onChange={v => set('name', v)} placeholder="Your full name" />
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <label style={{ fontSize: 12, color: c.textSecondary, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6 }}>
                Email address
                <span style={{ fontSize: 11, color: c.border, background: c.surface2, border: `1px solid ${c.border}`, borderRadius: 4, padding: '1px 6px' }}>read-only</span>
              </label>
              <div style={{ background: c.surface2, border: `1px solid ${c.border}`, borderRadius: 6, padding: '10px 12px', color: c.textSecondary, fontSize: 14, opacity: 0.7, display: 'flex', alignItems: 'center', gap: 8 }}>
                <Icon name="lock" size={13} color={c.textSecondary} />{user.email}
              </div>
            </div>
            <FormTextarea label="Bio" value={form.bio} onChange={v => set('bio', v)} placeholder="Tell your team a bit about yourself…" rows={3} />
          </div>
          <div style={{ marginTop: 20, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12 }}>
            {saved && <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: c.success, fontSize: 13, animation: 'fadeIn 0.2s ease' }}><Icon name="check" size={14} color={c.success} />Changes saved</div>}
            <Btn variant="primary" loading={loading} onClick={handleSave}>{loading ? 'Saving…' : 'Save Changes'}</Btn>
          </div>
        </div>

        <div style={{ background: c.surface, border: '1px solid rgba(239,68,68,0.2)', borderRadius: 8, padding: 20, marginTop: 14 }}>
          <h3 style={{ fontSize: 13, fontWeight: 500, color: c.danger, marginBottom: 6 }}>Danger Zone</h3>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
            <p style={{ fontSize: 13, color: c.textSecondary, lineHeight: 1.55 }}>Permanently delete your account and all associated data.</p>
            <Btn variant="danger" size="sm" style={{ flexShrink: 0 }}>Delete Account</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── APP ROOT ── */
function App() {
  const [page, setPage]           = React.useState('checking');
  const [projects, setProjects]   = React.useState([]);
  const [user, setUser]           = React.useState(null);
  const [sidebarCollapsed, setSC] = React.useState(false);

  React.useEffect(() => {
    api('GET', '/auth/current-user')
      .then(data => { setUser(toUserShape(data)); loadProjects(); setPage('dashboard'); })
      .catch(() => setPage('landing'));
  }, []);

  const loadProjects = () => {
    api('GET', '/projects')
      .then(data => setProjects((data || []).map(toProjectShape)))
      .catch(() => {});
  };

  const navigate = p => {
    if (p === 'projects') loadProjects();
    setPage(p);
  };

  const onLogin = userData => {
    setUser(userData);
    loadProjects();
    setPage('dashboard');
  };

  const onLogout = async () => {
    try { await api('POST', '/auth/logout'); } catch (_) {}
    setUser(null);
    setProjects([]);
    setPage('landing');
  };

  const appPages = ['dashboard', 'projects', 'profile'];

  if (page === 'checking') {
    return (
      <div style={{ height: '100%', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.5" style={{ animation: 'spin 0.7s linear infinite' }}><path d="M12 3a9 9 0 0 1 9 9"/><path d="M21 12a9 9 0 01-9 9M3 12a9 9 0 019-9" strokeOpacity="0.3"/></svg>
      </div>
    );
  }

  return (
    <ThemeContext.Provider value={C}>
      <div style={{ height: '100%', background: C.bg }}>
        {page === 'landing'  && <LandingPage  navigate={navigate} />}
        {page === 'login'    && <LoginPage    navigate={navigate} onLogin={onLogin} />}
        {page === 'register' && <RegisterPage navigate={navigate} onLogin={onLogin} />}
        {appPages.includes(page) && user && (
          <AppLayout page={page} navigate={navigate} user={user} sidebarCollapsed={sidebarCollapsed} setSidebarCollapsed={setSC} onLogout={onLogout}>
            {page === 'dashboard' && <DashboardPage projects={projects} navigate={navigate} user={user} />}
            {page === 'projects'  && <ProjectsPage  projects={projects} setProjects={setProjects} />}
            {page === 'profile'   && <ProfilePage   user={user} setUser={setUser} />}
          </AppLayout>
        )}
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
