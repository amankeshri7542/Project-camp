/* ─────────────────────────────────────────

const useC = () => React.useContext(ThemeContext);

/* ─────────────────────────────────────────
   GLOBAL CSS
───────────────────────────────────────── */

    html, body, #root { height: 100%; }

/* ─────────────────────────────────────────
   API HELPERS
───────────────────────────────────────── */
const api = async (method, path, body) => {
  const opts = { method, credentials: 'include', headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`/api/v1${path}`, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || 'Request failed');
  return json.data;
};

const toUserShape = u => u ? ({
  _id: u._id, name: u.fullName || u.username || 'User', email: u.email || '',
  bio: u.bio || '', username: u.username || '',
  initials: (u.fullName || u.username || 'U').trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join(''),
  joinedAt: u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : '',
}) : null;

const toProjectShape = p => p ? ({
  id: p._id, _id: p._id, name: p.name, description: p.description || '',
  status: p.status || 'todo', priority: 'medium',
  updatedAt: p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '',
  tasks: 0, completed: 0,
}) : null;

/* ─────────────────────────────────────────
   HOOKS
───────────────────────────────────────── */
const useMobile = () => {
  const [mobile, setMobile] = React.useState(window.innerWidth < 768);
  React.useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
};

   STATUS / PRIORITY CONFIG
───────────────────────────────────────── */

/* ─────────────────────────────────────────

      <div style={{ position:'absolute', width:'75%', height:'80%', bottom:'-20%', right:'-15%', background:'radial-gradient(ellipse, rgba(150,60,230,0.55) 0%, rgba(100,35,180,0.2) 40%, transparent 65%)', animation:'orbDrift2 32s ease infinite alternate' }} />
      <div style={{ position:'absolute', width:720, height:720, borderRadius:'50%', top:'-15%', right:'5%', background:'radial-gradient(circle, rgba(255,70,130,0.38) 0%, rgba(220,50,100,0.12) 45%, transparent 68%)', animation:'orbDrift3 22s ease infinite alternate' }} />

}

/* ─────────────────────────────────────────
   LOGO
───────────────────────────────────────── */
function Logo({ size='md' }) {
  const sz = size==='sm'?20:size==='lg'?32:26;
  const ts = size==='sm'?13:size==='lg'?20:15;
  const id = `lg${sz}`;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, userSelect:'none', flexShrink:0 }}>
      <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none">
        <defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#60A5FA"/><stop offset="100%" stopColor="#A78BFA"/></linearGradient></defs>
        <path d="M12 2L2 21h20L12 2z" fill={`url(#${id})`} />
        <path d="M12 9v7M9.5 14.5h5" stroke="white" strokeWidth="1.6" strokeLinecap="round" />
      </svg>
      <span style={{ fontSize:ts, fontWeight:600, color:'#F8F8FF', letterSpacing:'-0.025em', fontFamily:'Sora,sans-serif' }}>
        Project<span style={{ color:'#60A5FA' }}>Camp</span>
      </span>
    </div>
  );
}

/* ─────────────────────────────────────────

───────────────────────────────────────── */

  const paths = {

    grid:      <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,

    search:    <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    plus:      <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    edit:      <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:     <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    x:         <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    chevL:     <polyline points="15 18 9 12 15 6"/>,
    chevR:     <polyline points="9 18 15 12 9 6"/>,
    chevD:     <polyline points="6 9 12 15 18 9"/>,
    menu:      <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    arrowUR:   <><path d="M7 17L17 7"/><path d="M7 7h10v10"/></>,
    users:     <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>,
    mail:      <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,

/* ─────────────────────────────────────────
   BADGES
───────────────────────────────────────── */
function StatusBadge({ status }) {
  const cfg = STATUS_CFG[status] || STATUS_CFG.todo;
  return <span style={{ background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}`, borderRadius:20, fontSize:11, padding:'3px 10px', fontWeight:500, whiteSpace:'nowrap', display:'inline-block', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)' }}>{cfg.label}</span>;
}
function PriorityBadge({ priority }) {
  const cfg = PRIORITY_CFG[priority] || PRIORITY_CFG.low;
  return <span style={{ background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}`, borderRadius:20, fontSize:11, padding:'3px 10px', fontWeight:500, whiteSpace:'nowrap', display:'inline-block', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)' }}>{cfg.label}</span>;
}

/* ─────────────────────────────────────────
   BUTTON
───────────────────────────────────────── */
function Btn({ variant='primary', children, onClick, disabled, loading, style:xs, size='md', fullWidth }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  const [act, setAct] = React.useState(false);
  const pad = {sm:'6px 14px',md:'9px 18px',lg:'11px 24px'}[size]||'9px 18px';
  const spring = 'all 0.2s cubic-bezier(0.34,1.56,0.64,1)';
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center', gap:7,
    borderRadius:8, fontSize:14, fontWeight:500,
    cursor:disabled||loading?'not-allowed':'pointer',
    transition:spring, padding:pad, opacity:disabled?0.45:1,
    transform:act?'scale(0.97)':hov?'scale(1.02)':'scale(1)',
    whiteSpace:'nowrap', width:fullWidth?'100%':undefined,
    backdropFilter:'blur(12px) saturate(1.8)', WebkitBackdropFilter:'blur(12px) saturate(1.8)',
    ...xs,
  };
  const ar = c.accent==='#60A5FA'?'96,165,250':'96,165,250';
  if (variant==='primary') Object.assign(base, {
    background:hov?`rgba(${ar},0.18)`:`rgba(${ar},0.10)`,
    border:`1px solid rgba(${ar},${hov?0.75:0.45})`,
    color:c.accent,
    textShadow:hov?`0 0 22px rgba(${ar},0.65)`:`0 0 14px rgba(${ar},0.3)`,
    boxShadow:hov?`0 0 20px rgba(${ar},0.12),inset 0 1px 0 rgba(255,255,255,0.2)`:'inset 0 1px 0 rgba(255,255,255,0.12)',
  });
  if (variant==='ghost') Object.assign(base, {
    background:hov?'rgba(255,255,255,0.09)':'rgba(255,255,255,0.05)',
    border:'1px solid rgba(255,255,255,0.18)', color:'#F8F8FF',
    boxShadow:'inset 0 1px 0 rgba(255,255,255,0.15)',
  });
  if (variant==='danger') Object.assign(base, {
    background:hov?'rgba(255,107,107,0.18)':'rgba(255,107,107,0.10)',
    border:`1px solid rgba(255,107,107,${hov?0.7:0.4})`,
    color:'#FF6B6B',
    textShadow:hov?'0 0 18px rgba(255,107,107,0.55)':'none',
  });
  if (variant==='surface') Object.assign(base, {
    background:hov?'rgba(255,255,255,0.10)':'rgba(255,255,255,0.05)',
    border:'1px solid rgba(255,255,255,0.14)', color:'rgba(248,248,255,0.6)',
  });
  return (
    <button style={base} onClick={disabled||loading?undefined:onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>{setHov(false);setAct(false);}}
      onMouseDown={()=>setAct(true)} onMouseUp={()=>setAct(false)}>
      {loading&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{animation:'spin 0.7s linear infinite',flexShrink:0}}><path d="M12 3a9 9 0 0 1 9 9"/><path d="M21 12a9 9 0 01-9 9M3 12a9 9 0 019-9" strokeOpacity="0.3"/></svg>}
      {children}
    </button>
  );
}

/* ─────────────────────────────────────────
   FORM CONTROLS
───────────────────────────────────────── */
function FormInput({ label, value, onChange, type='text', placeholder, disabled, autoFocus, onKeyDown, style:xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6, ...xs }}>
      {label&&<label style={{ fontSize:12, color:c.textSecondary, fontWeight:500, letterSpacing:'0.02em' }}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange&&onChange(e.target.value)}
        placeholder={placeholder} disabled={disabled} autoFocus={autoFocus} onKeyDown={onKeyDown}
        onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
        style={{ backdropFilter:'blur(20px) saturate(1.4)', WebkitBackdropFilter:'blur(20px) saturate(1.4)', background:foc?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.05)', border:`1px solid ${foc?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.1)'}`, borderRadius:8, padding:'10px 13px', color:disabled?'rgba(248,248,255,0.35)':c.textPrimary, fontSize:14, outline:'none', width:'100%', boxShadow:foc?'0 0 0 3px rgba(96,165,250,0.1), inset 0 1px 0 rgba(255,255,255,0.15)':'inset 0 1px 0 rgba(255,255,255,0.08)', transition:'all 0.15s ease', opacity:disabled?0.6:1 }} />
    </div>
  );
}

function FormTextarea({ label, value, onChange, placeholder, rows=3, style:xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6, ...xs }}>
      {label&&<label style={{ fontSize:12, color:c.textSecondary, fontWeight:500, letterSpacing:'0.02em' }}>{label}</label>}
      <textarea value={value} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder} rows={rows}
        onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
        style={{ backdropFilter:'blur(20px) saturate(1.4)', WebkitBackdropFilter:'blur(20px) saturate(1.4)', background:foc?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.05)', border:`1px solid ${foc?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.1)'}`, borderRadius:8, padding:'10px 13px', color:c.textPrimary, fontSize:14, outline:'none', width:'100%', resize:'vertical', minHeight:80, boxShadow:foc?'0 0 0 3px rgba(96,165,250,0.1), inset 0 1px 0 rgba(255,255,255,0.15)':'inset 0 1px 0 rgba(255,255,255,0.08)', transition:'all 0.15s ease', fontFamily:'DM Sans,sans-serif', lineHeight:1.6 }} />
    </div>
  );
}

function FormSelect({ label, value, onChange, options, style:xs }) {
  const c = useC();
  const [foc, setFoc] = React.useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6, ...xs }}>
      {label&&<label style={{ fontSize:12, color:c.textSecondary, fontWeight:500, letterSpacing:'0.02em' }}>{label}</label>}
      <div style={{ position:'relative' }}>
        <select value={value} onChange={e=>onChange&&onChange(e.target.value)}
          onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
          style={{ backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', background:foc?'rgba(30,22,58,0.9)':'rgba(22,20,40,0.88)', border:`1px solid ${foc?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.1)'}`, borderRadius:8, padding:'10px 36px 10px 13px', color:c.textPrimary, fontSize:14, outline:'none', width:'100%', cursor:'pointer', boxShadow:foc?'0 0 0 3px rgba(96,165,250,0.1)':'none', transition:'all 0.15s', appearance:'none', WebkitAppearance:'none' }}>
          {options.map(o=><option key={o.value} value={o.value} style={{ background:'#161428', color:'#F8F8FF' }}>{o.label}</option>)}
        </select>
        <div style={{ position:'absolute', right:11, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
          <Icon name="chevD" size={13} color={c.accent} />
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   CONFIRM DIALOG
───────────────────────────────────────── */
function ConfirmDialog({ title, message, onConfirm, onCancel }) {

/* ─────────────────────────────────────────
   DONUT CHART
───────────────────────────────────────── */
function DonutChart({ projects }) {
  const c = useC();
  const total = projects.length;
  if (!total) return <div style={{ height:110, display:'flex', alignItems:'center', justifyContent:'center', color:c.textSecondary, fontSize:13 }}>No data yet</div>;
  const done   = projects.filter(p=>p.status==='done').length;
  const inProg = projects.filter(p=>p.status==='in_progress').length;
  const todo   = projects.filter(p=>p.status==='todo').length;
  const size=110, r=38, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const segs = [{count:done,color:c.success},{count:inProg,color:c.accent},{count:todo,color:'rgba(255,255,255,0.18)'}];
  let cum=0;
  const arcs = segs.map(seg=>{ const len=(seg.count/total)*circ; const off=circ-cum; cum+=len; return {...seg,len,off}; });
  return (
    <div style={{ display:'flex', alignItems:'center', gap:20 }}>
      <svg width={size} height={size} style={{ flexShrink:0 }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={9} />
        {arcs.map((arc,i)=>arc.len>0.5?<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={arc.color} strokeWidth={9} strokeDasharray={`${arc.len} ${circ-arc.len}`} strokeDashoffset={arc.off} style={{ transform:'rotate(-90deg)', transformOrigin:`${cx}px ${cy}px`, transition:'all 0.5s ease' }} />:null)}
        <text x={cx} y={cy-3} textAnchor="middle" dominantBaseline="middle" fill="#F8F8FF" fontSize="18" fontWeight="600" fontFamily="Sora">{total}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fill="rgba(248,248,255,0.5)" fontSize="10" fontFamily="DM Sans">projects</text>
      </svg>
      <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
        {[{label:'Done',count:done,color:c.success},{label:'Active',count:inProg,color:c.accent},{label:'Todo',count:todo,color:'rgba(248,248,255,0.4)'}].map(item=>(
          <div key={item.label} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:7, height:7, borderRadius:'50%', background:item.color, flexShrink:0 }} />
            <span style={{ fontSize:12, color:c.textSecondary, minWidth:50 }}>{item.label}</span>
            <span style={{ fontSize:12, color:c.textPrimary, fontWeight:600 }}>{item.count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuthLayout({ children }) {
  return (
    <div style={{ minHeight:'100%', position:'relative', zIndex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px 16px' }}>
      <div style={{ width:'100%', maxWidth:420, animation:'fadeSlideUp 0.3s ease' }}>{children}</div>
    </div>
  );
}

function ErrorAlert({ msg }) {
  if (!msg) return null;
  return (
    <div style={{ background:'rgba(255,107,107,0.08)', border:'1px solid rgba(255,107,107,0.25)', borderRadius:8, padding:'9px 13px', marginBottom:16, fontSize:13, color:'#FF6B6B', display:'flex', alignItems:'center', gap:8 }}>
      <Icon name="x" size={13} color="#FF6B6B"/>{msg}
    </div>
  );
}

function LoginPage({ navigate, onLogin, onClose, setMode }) {
  const c = useC();
  const [email, setEmail]       = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading]   = React.useState(false);
  const [error, setError]       = React.useState('');

  const submit = async () => {
    if (!email||!password) { setError('Please fill in all fields.'); return; }
    setError(''); setLoading(true);
    try {
      const data = await api('POST', '/auth/login', { email, password });
      onLogin(toUserShape(data.user));
    } catch(e) {
      setError(e.message || 'Login failed. Check your credentials.');
    } finally { setLoading(false); }
  };

  return (
    <AuthLayout>
      <div style={{ ...GLASS.deep, borderRadius:20, padding:'clamp(24px,4vw,36px)', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:0, left:'10%', right:'10%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent)', pointerEvents:'none', zIndex:2 }} />
        {onClose && (
          <button onClick={onClose} title="Close"
            style={{ position:'absolute', top:14, right:14, zIndex:10, background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.14)', borderRadius:'50%', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all 0.15s' }}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.14)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.07)';}}>
            <Icon name="x" size={14} color={c.textSecondary} />
          </button>
        )}
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}><Logo size="md" /></div>
          <h1 style={{ fontSize:22, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.02em', marginBottom:7 }}>Welcome back</h1>
          <p style={{ fontSize:13, color:c.textSecondary }}>Sign in to continue to your workspace.</p>
        </div>
        <ErrorAlert msg={error} />
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <FormInput label="Email" type="email" value={email} onChange={setEmail} placeholder="you@company.com" autoFocus />
          <div>
            <FormInput label="Password" type="password" value={password} onChange={setPassword} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()} />
            <div style={{ display:'flex', justifyContent:'flex-end', marginTop:7 }}>
              <button onClick={()=>setMode?setMode('forgot'):null} style={{ background:'none', border:'none', cursor:'pointer', color:c.accent, fontSize:12, padding:0, fontFamily:'DM Sans,sans-serif' }}>Forgot password?</button>
            </div>
          </div>
          <Btn variant="primary" fullWidth loading={loading} onClick={submit} style={{ marginTop:4, justifyContent:'center' }}>
            {loading?'Signing in…':'Sign in'}
          </Btn>
        </div>
        <div style={{ marginTop:24, paddingTop:20, borderTop:'1px solid rgba(255,255,255,0.08)', textAlign:'center' }}>
          <p style={{ fontSize:13, color:c.textSecondary }}>
            Don't have an account?{' '}
            <button onClick={()=>setMode?setMode('register'):navigate('register')} style={{ background:'none', border:'none', cursor:'pointer', color:c.accent, fontSize:13, fontWeight:500, padding:0, fontFamily:'DM Sans,sans-serif' }}>Create one</button>
          </p>
        </div>
      </div>
    </AuthLayout>
  );
}

function RegisterPage({ navigate, onLogin, onClose, setMode }) {
  const c = useC();
  const [form, setForm]       = React.useState({ name:'', username:'', email:'', password:'' });
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async () => {
    if (!form.name||!form.username||!form.email||!form.password) { setError('Please fill in all fields.'); return; }
    if (form.password.length<8) { setError('Password must be at least 8 characters.'); return; }
    setError(''); setLoading(true);
    try {
      await api('POST', '/auth/register', { fullName:form.name, username:form.username.toLowerCase(), email:form.email, password:form.password });
      const data = await api('POST', '/auth/login', { email:form.email, password:form.password });
      onLogin(toUserShape(data.user));
    } catch(e) {
      setError(e.message || 'Registration failed. Please try again.');
    } finally { setLoading(false); }
  };

  return (
    <AuthLayout>
      <div style={{ ...GLASS.deep, borderRadius:20, padding:'clamp(24px,4vw,36px)', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:0, left:'10%', right:'10%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent)', pointerEvents:'none', zIndex:2 }} />
        {onClose && (
          <button onClick={onClose} title="Close"
            style={{ position:'absolute', top:14, right:14, zIndex:10, background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.14)', borderRadius:'50%', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all 0.15s' }}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.14)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.07)';}}>
            <Icon name="x" size={14} color={c.textSecondary} />
          </button>
        )}
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}><Logo size="md" /></div>
          <h1 style={{ fontSize:22, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.02em', marginBottom:7 }}>Create your account</h1>
          <p style={{ fontSize:13, color:c.textSecondary }}>Start managing projects with your team.</p>
        </div>
        <ErrorAlert msg={error} />
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <FormInput label="Full name"    value={form.name}     onChange={v=>set('name',v)}     placeholder="Alex Morgan" autoFocus />
          <FormInput label="Username"     value={form.username} onChange={v=>set('username',v)} placeholder="alexmorgan" />
          <FormInput label="Email"        type="email" value={form.email}    onChange={v=>set('email',v)}    placeholder="you@company.com" />
          <FormInput label="Password"     type="password" value={form.password} onChange={v=>set('password',v)} placeholder="At least 8 characters" onKeyDown={e=>e.key==='Enter'&&submit()} />
          <div style={{ background:'rgba(96,165,250,0.06)', border:'1px solid rgba(96,165,250,0.15)', borderRadius:8, padding:'10px 13px', display:'flex', gap:8 }}>
            <Icon name="lock" size={13} color="rgba(96,165,250,0.6)" />
            <span style={{ fontSize:12, color:c.textSecondary, lineHeight:1.55 }}>Your data is encrypted and never shared.</span>
          </div>
          <Btn variant="primary" fullWidth loading={loading} onClick={submit} style={{ marginTop:4, justifyContent:'center' }}>
            {loading?'Creating account…':'Create account'}
          </Btn>
        </div>
        <div style={{ marginTop:24, paddingTop:20, borderTop:'1px solid rgba(255,255,255,0.08)', textAlign:'center' }}>
          <p style={{ fontSize:13, color:c.textSecondary }}>
            Already have an account?{' '}
            <button onClick={()=>setMode?setMode('login'):navigate('login')} style={{ background:'none', border:'none', cursor:'pointer', color:c.accent, fontSize:13, fontWeight:500, padding:0, fontFamily:'DM Sans,sans-serif' }}>Sign in</button>
          </p>
        </div>
      </div>
    </AuthLayout>
  );
}

function ForgotPasswordForm({ onClose, setMode }) {
  const c = useC();
  const [email, setEmail]     = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [sent, setSent]       = React.useState(false);
  const [error, setError]     = React.useState('');

  const submit = async () => {
    if (!email) { setError('Please enter your email address.'); return; }
    setError(''); setLoading(true);
    try {
      await api('POST', '/auth/forgot-password', { email });
      setSent(true);
    } catch(e) {
      setError(e.message || 'Could not send reset email. Check the address and try again.');
    } finally { setLoading(false); }
  };

  return (
    <AuthLayout>
      <div style={{ ...GLASS.deep, borderRadius:20, padding:'clamp(24px,4vw,36px)', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:0, left:'10%', right:'10%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent)', pointerEvents:'none', zIndex:2 }} />
        {onClose && (
          <button onClick={onClose} title="Close"
            style={{ position:'absolute', top:14, right:14, zIndex:10, background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.14)', borderRadius:'50%', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all 0.15s' }}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.14)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.07)';}}>
            <Icon name="x" size={14} color={c.textSecondary} />
          </button>
        )}
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
            <div style={{ width:52, height:52, borderRadius:14, background:'rgba(96,165,250,0.1)', border:'1px solid rgba(96,165,250,0.25)', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name="lock" size={22} color={c.accent} />
            </div>
          </div>
          <h1 style={{ fontSize:22, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.02em', marginBottom:7 }}>Reset your password</h1>
          <p style={{ fontSize:13, color:c.textSecondary, lineHeight:1.65 }}>Enter your email and we'll send a reset link.</p>
        </div>
        {sent ? (
          <div style={{ background:'rgba(168,255,120,0.07)', border:'1px solid rgba(168,255,120,0.25)', borderRadius:10, padding:'16px 18px', textAlign:'center' }}>
            <Icon name="check" size={20} color={c.success} />
            <p style={{ fontSize:14, color:c.success, fontWeight:500, marginTop:10, marginBottom:6 }}>Reset link sent!</p>
            <p style={{ fontSize:13, color:c.textSecondary, lineHeight:1.65 }}>Check your inbox at <strong style={{ color:c.textPrimary }}>{email}</strong>. The link expires in 20 minutes.</p>
            <p style={{ fontSize:12, color:c.textSecondary, marginTop:10 }}>No email? Check your spam folder or try again.</p>
          </div>
        ) : (
          <>
            <ErrorAlert msg={error} />
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <FormInput label="Email address" type="email" value={email} onChange={setEmail} placeholder="you@company.com" autoFocus onKeyDown={e=>e.key==='Enter'&&submit()} />
              <Btn variant="primary" fullWidth loading={loading} onClick={submit} style={{ justifyContent:'center' }}>
                {loading ? 'Sending…' : 'Send reset link'}
              </Btn>
            </div>
          </>
        )}
        <div style={{ marginTop:24, paddingTop:20, borderTop:'1px solid rgba(255,255,255,0.08)', textAlign:'center' }}>
          <button onClick={()=>setMode?setMode('login'):onClose&&onClose()} style={{ background:'none', border:'none', cursor:'pointer', color:c.accent, fontSize:13, fontWeight:500, padding:0, fontFamily:'DM Sans,sans-serif', display:'inline-flex', alignItems:'center', gap:5 }}>
            <Icon name="chevL" size={13} color={c.accent} /> Back to sign in
          </button>
        </div>
      </div>
    </AuthLayout>
  );
}

function StatCard({ icon, label, value, color, idx }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ ...(hov?GLASS.lifted:GLASS.surface), borderRadius:14, padding:20, display:'flex', flexDirection:'column', gap:14, transition:'all 0.22s cubic-bezier(0.34,1.56,0.64,1)', transform:hov?'translateY(-3px)':'translateY(0)', position:'relative', overflow:'hidden', cursor:'default', animation:`cardReveal 0.45s ease ${idx*0.08}s both` }}>
      <div style={{ position:'absolute', top:14, right:16, opacity:0.2 }}><Icon name={icon} size={22} color={color} /></div>
      <div>
        <div style={{ fontSize:34, fontWeight:600, color, lineHeight:1, letterSpacing:'-0.03em', fontFamily:'Sora,sans-serif', textShadow:`0 0 30px ${color}55` }}>{value}</div>
        <div style={{ fontSize:12, color:c.textSecondary, marginTop:6 }}>{label}</div>
      </div>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${color}60,transparent)`, opacity:hov?1:0, transition:'opacity 0.2s' }} />
    </div>
  );
}

function DashboardPage({ projects, navigate, user }) {
  const c = useC();
  const mobile = useMobile();
  const stats = React.useMemo(()=>({ total:projects.length, inProgress:projects.filter(p=>p.status==='in_progress').length, completed:projects.filter(p=>p.status==='done').length, todo:projects.filter(p=>p.status==='todo').length }), [projects]);
  const recent = React.useMemo(()=>projects.slice(0,5), [projects]);
  const greeting = (() => { const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; })();

  return (
    <div style={{ padding:mobile?'20px 16px 90px':'36px', maxWidth:1160, margin:'0 auto' }}>
      <div style={{ marginBottom:28 }}>
        <h1 style={{ fontSize:mobile?22:26, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.025em', marginBottom:5 }}>{greeting}, {user.name.split(' ')[0]} 👋</h1>
        <p style={{ fontSize:13, color:c.textSecondary }}>{stats.inProgress} active · {stats.todo} todo · {stats.completed} completed</p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:mobile?'repeat(2,1fr)':'repeat(4,1fr)', gap:12, marginBottom:18 }}>
        <StatCard icon="folder"   label="Total"      value={stats.total}       color={c.accent}                idx={0} />
        <StatCard icon="activity" label="Active"     value={stats.inProgress}  color="#A78BFA"                 idx={1} />
        <StatCard icon="check"    label="Completed"  value={stats.completed}   color={c.success}               idx={2} />

      </div>

      <div style={{ display:'grid', gridTemplateColumns:mobile?'1fr':'1fr 270px', gap:14, alignItems:'start' }}>
        <div style={{ ...GLASS.surface, borderRadius:14, overflow:'hidden', position:'relative' }}>

          <div style={{ padding:'15px 20px', borderBottom:'1px solid rgba(255,255,255,0.08)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <h2 style={{ fontSize:14, fontWeight:600, color:c.textPrimary }}>Recent Projects</h2>

              View all <Icon name="arrowUR" size={11} color={c.accent} />

          </div>
          {mobile ? (
            <div style={{ padding:'8px 0' }}>
              {recent.map(proj=>(

              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   PROJECTS PAGE
───────────────────────────────────────── */
const STATUS_OPTS   = [{value:'todo',label:'Todo'},{value:'in_progress',label:'In Progress'},{value:'done',label:'Done'}];
const PRIORITY_OPTS = [{value:'low',label:'Low'},{value:'medium',label:'Medium'},{value:'high',label:'High'}];
const FILTER_TABS   = [{id:'all',label:'All'},{id:'todo',label:'Todo'},{id:'in_progress',label:'Active'},{id:'done',label:'Done'}];

function FilterPill({ tab, active, onClick, count }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ ...(active?{...GLASS.lifted,background:'rgba(96,165,250,0.12)',border:'1px solid rgba(96,165,250,0.45)'}:GLASS.surface), color:active?c.accent:(hov?c.textPrimary:c.textSecondary), borderRadius:8, padding:'7px 12px', fontSize:13, fontWeight:active?500:400, cursor:'pointer', transition:'all 0.2s cubic-bezier(0.34,1.56,0.64,1)', display:'flex', alignItems:'center', gap:6, fontFamily:'DM Sans,sans-serif', whiteSpace:'nowrap' }}>
      {tab.label}
      <span style={{ fontSize:11, background:'rgba(255,255,255,0.1)', color:active?c.accent:c.textSecondary, borderRadius:10, padding:'1px 7px', fontWeight:500 }}>{count}</span>
    </button>
  );
}

function IconBtn({ icon, onClick, title, danger }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={e=>{e.stopPropagation();onClick();}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} title={title}
      style={{ background:hov?(danger?'rgba(255,107,107,0.12)':'rgba(96,165,250,0.1)'):'transparent', border:'none', cursor:'pointer', color:hov?(danger?c.danger:c.accent):c.textSecondary, padding:6, borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s' }}>
      <Icon name={icon} size={13} color={hov?(danger?c.danger:c.accent):c.textSecondary} />
    </button>
  );
}

function ProjectCard({ project, onEdit, onDelete, idx }) {
  const c = useC();
  const [hov, setHov] = React.useState(false);
  const pct = project.tasks>0?Math.round((project.completed/project.tasks)*100):0;
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ ...(hov?GLASS.lifted:GLASS.surface), borderRadius:14, padding:20, display:'flex', flexDirection:'column', gap:12, transition:'all 0.25s cubic-bezier(0.34,1.56,0.64,1)', transform:hov?'translateY(-4px)':'translateY(0)', position:'relative', overflow:'hidden', animation:`cardReveal 0.45s ease ${(idx||0)*0.06}s both` }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent)', pointerEvents:'none' }} />
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
        <h3 style={{ fontSize:15, fontWeight:600, color:c.textPrimary, lineHeight:1.4, flex:1, fontFamily:'Sora,sans-serif' }}>{project.name}</h3>
        <div style={{ display:'flex', gap:2, opacity:hov?1:0, transition:'opacity 0.15s', flexShrink:0 }}>
          <IconBtn icon="edit"  onClick={onEdit}   title="Edit" />
          <IconBtn icon="trash" onClick={onDelete} title="Delete" danger />
        </div>
      </div>
      <p style={{ fontSize:13, color:c.textSecondary, lineHeight:1.7, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{project.description||'No description.'}</p>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        <StatusBadge status={project.status} />
        <PriorityBadge priority={project.priority||'medium'} />
      </div>
      {project.tasks>0&&(
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
            <span style={{ fontSize:11, color:c.textSecondary }}>{project.completed}/{project.tasks} tasks</span>
            <span style={{ fontSize:11, color:c.textSecondary }}>{pct}%</span>
          </div>
          <div style={{ height:3, background:'rgba(255,255,255,0.08)', borderRadius:4, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${pct}%`, background:`linear-gradient(90deg,${c.accent},#A78BFA)`, borderRadius:4, transition:'width 0.5s ease' }} />
          </div>
        </div>
      )}
      <div style={{ paddingTop:5, borderTop:'1px solid rgba(255,255,255,0.07)', display:'flex', justifyContent:'flex-end' }}>
        <span style={{ fontSize:11, color:c.textSecondary, fontFamily:'JetBrains Mono,monospace' }}>Updated {project.updatedAt||'—'}</span>
      </div>
    </div>
  );
}

function ProjectModal({ mode, project, onSave, onClose }) {
  const c = useC();
  const [form, setForm]       = React.useState({ name:project?.name||'', description:project?.description||'', status:project?.status||'todo', priority:project?.priority||'medium' });
  const [loading, setLoading] = React.useState(false);
  const [errors, setErrors]   = React.useState({});
  const set = (k,v)=>{ setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:null})); };

  const handleSave = async () => {
    const errs={};
    if (!form.name.trim()) errs.name='Project name is required.';
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setLoading(true);
    try { await onSave(form); } finally { setLoading(false); }
  };

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', backdropFilter:'blur(10px)', WebkitBackdropFilter:'blur(10px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:300, animation:'fadeIn 0.15s ease', padding:'20px 16px' }}>
      <div style={{ ...GLASS.deep, borderRadius:20, width:'100%', maxWidth:530, animation:'fadeSlideUp 0.22s ease', overflow:'hidden', position:'relative' }}>
        <div style={{ position:'absolute', top:0, left:'10%', right:'10%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent)', pointerEvents:'none', zIndex:2 }} />
        <div style={{ padding:'20px 24px', borderBottom:'1px solid rgba(255,255,255,0.08)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <h2 style={{ fontSize:16, fontWeight:600, color:c.textPrimary }}>{mode==='new'?'New Project':'Edit Project'}</h2>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:c.textSecondary, padding:4, borderRadius:6, display:'flex' }}><Icon name="x" size={16} color={c.textSecondary} /></button>
        </div>
        <div style={{ padding:'22px 24px', display:'flex', flexDirection:'column', gap:16 }}>
          <div>
            <FormInput label="Project Name" value={form.name} onChange={v=>set('name',v)} placeholder="e.g. E-commerce Redesign" autoFocus />
            {errors.name&&<p style={{ fontSize:12, color:c.danger, marginTop:5 }}>{errors.name}</p>}
          </div>
          <FormTextarea label="Description" value={form.description} onChange={v=>set('description',v)} placeholder="Brief description of the project scope and goals…" rows={3} />
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <FormSelect label="Status"   value={form.status}   onChange={v=>set('status',v)}   options={STATUS_OPTS} />
            <FormSelect label="Priority" value={form.priority} onChange={v=>set('priority',v)} options={PRIORITY_OPTS} />
          </div>
        </div>
        <div style={{ padding:'14px 24px', borderTop:'1px solid rgba(255,255,255,0.08)', display:'flex', justifyContent:'flex-end', gap:8 }}>
          <Btn variant="surface" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" loading={loading} onClick={handleSave}>{loading?'Saving…':mode==='new'?'Create Project':'Save Changes'}</Btn>
        </div>
      </div>
    </div>
  );
}

function ProjectsPage({ projects, setProjects, openAuth, user }) {
  const c = useC();
  const mobile = useMobile();
  const [filter, setFilter]       = React.useState('all');
  const [search, setSearch]       = React.useState('');
  const [modal, setModal]         = React.useState(null);
  const [confirm, setConfirm]     = React.useState(null);
  const [searchFoc, setSearchFoc] = React.useState(false);
  const [apiErr, setApiErr]       = React.useState('');
  const [priorities, setPriorities] = React.useState({});

  const getProjectPriority = id => priorities[id] || 'medium';

  const filtered = React.useMemo(()=>
    projects
      .filter(p=>filter==='all'||p.status===filter)
      .filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||(p.description||'').toLowerCase().includes(search.toLowerCase())),
    [projects, filter, search]
  );
  const getCount = id => id==='all'?projects.length:projects.filter(p=>p.status===id).length;

  const handleSave = async data => {
    try {
      if (modal.mode==='new') {
        const created = await api('POST','/projects',{ name:data.name, description:data.description, status:data.status });
        const shaped = toProjectShape(created);
        setProjects(prev=>[shaped,...prev]);
        if (data.priority) setPriorities(prev=>({...prev,[shaped._id]:data.priority}));
      } else {
        const updated = await api('PUT',`/projects/${modal.project._id}`,{ name:data.name, description:data.description, status:data.status });
        const shaped = toProjectShape(updated);
        setProjects(prev=>prev.map(p=>p._id===modal.project._id?shaped:p));
        if (data.priority) setPriorities(prev=>({...prev,[modal.project._id]:data.priority}));
      }
      setModal(null);
    } catch(e) { setApiErr(e.message); }
  };

  const handleDelete = async id => {
    try {
      await api('DELETE',`/projects/${id}`);
      setProjects(prev=>prev.filter(p=>p._id!==id));
      setConfirm(null);
    } catch(e) { setApiErr(e.message); setConfirm(null); }
  };

  return (
    <div style={{ padding:mobile?'20px 16px 90px':'36px', maxWidth:1160, margin:'0 auto' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24, gap:12 }}>
        <div>
          <h1 style={{ fontSize:mobile?20:26, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.025em', marginBottom:3 }}>My Projects</h1>
          <p style={{ fontSize:13, color:c.textSecondary }}>{projects.length} total · {projects.filter(p=>p.status==='in_progress').length} active</p>
        </div>
        <Btn variant="primary" size={mobile?'sm':'md'} onClick={()=>user?setModal({mode:'new'}):openAuth&&openAuth('login')}><Icon name="plus" size={14} color="currentColor"/>New</Btn>
      </div>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22, gap:10, flexWrap:'wrap' }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {FILTER_TABS.map(tab=><FilterPill key={tab.id} tab={tab} active={filter===tab.id} onClick={()=>setFilter(tab.id)} count={getCount(tab.id)} />)}
        </div>
        <div style={{ position:'relative', minWidth:mobile?'100%':220 }}>
          <div style={{ position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}><Icon name="search" size={13} color={c.textSecondary} /></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search projects…"
            onFocus={()=>setSearchFoc(true)} onBlur={()=>setSearchFoc(false)}
            style={{ backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', background:searchFoc?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.05)', border:`1px solid ${searchFoc?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.1)'}`, borderRadius:8, padding:'8px 13px 8px 32px', color:c.textPrimary, fontSize:13, outline:'none', width:'100%', transition:'all 0.15s', boxShadow:searchFoc?'0 0 0 3px rgba(96,165,250,0.1)':'none', fontFamily:'DM Sans,sans-serif' }} />
        </div>
      </div>

      {filtered.length===0
        ? <EmptyState title={search?'No results':'No projects yet'} description={search?'Try a different keyword.':(user?'Create your first project to start.':'Sign in to create and manage projects.')} action={!search?(user?'Create first project':'Sign in to continue'):undefined} onAction={()=>user?setModal({mode:'new'}):openAuth&&openAuth('login')} />
        : <div style={{ display:'grid', gridTemplateColumns:mobile?'1fr':'repeat(auto-fill,minmax(300px,1fr))', gap:14 }}>
            {filtered.map((proj,i)=>(
              <ProjectCard key={proj.id} project={{...proj, priority:getProjectPriority(proj._id)}} idx={i}
                onEdit={()=>setModal({mode:'edit', project:{...proj, priority:getProjectPriority(proj._id)}})}
                onDelete={()=>setConfirm(proj._id||proj.id)} />
            ))}
          </div>
      }

      {modal   && <ProjectModal mode={modal.mode} project={modal.project} onSave={handleSave} onClose={()=>setModal(null)} />}
      {confirm && <ConfirmDialog title="Delete project?" message="This will permanently delete the project and all its tasks. This cannot be undone." onConfirm={()=>handleDelete(confirm)} onCancel={()=>setConfirm(null)} />}
      {apiErr  && (
        <div style={{ position:'fixed', bottom:mobile?80:20, right:20, ...GLASS.deep, borderRadius:10, padding:'10px 16px', color:c.danger, fontSize:13, zIndex:500, display:'flex', alignItems:'center', gap:8, maxWidth:300, border:'1px solid rgba(255,107,107,0.3)', animation:'fadeSlideUp 0.2s ease' }}>
          <Icon name="x" size={13} color={c.danger}/>{apiErr}
          <button onClick={()=>setApiErr('')} style={{ background:'none', border:'none', cursor:'pointer', color:c.danger, marginLeft:'auto', padding:2, display:'flex' }}><Icon name="x" size={12} color={c.danger}/></button>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────
   PROFILE PAGE
───────────────────────────────────────── */
function ProfilePage({ user, setUser }) {
  const c = useC();
  const mobile = useMobile();
  const [form, setForm]       = React.useState({ name:user.name, bio:user.bio });
  const [loading, setLoading] = React.useState(false);
  const [saved, setSaved]     = React.useState(false);
  const set = (k,v)=>{ setForm(f=>({...f,[k]:v})); setSaved(false); };

  const handleSave = async () => {
    if (!form.name.trim()) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,400));
    const initials=form.name.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');
    setUser(u=>({...u, name:form.name.trim(), bio:form.bio, initials}));
    setLoading(false); setSaved(true); setTimeout(()=>setSaved(false),3000);
  };

  return (
    <div style={{ padding:mobile?'20px 16px 90px':'36px', maxWidth:1160, margin:'0 auto' }}>
      <div style={{ marginBottom:26 }}>
        <h1 style={{ fontSize:mobile?20:26, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.025em', marginBottom:5 }}>Profile</h1>
        <p style={{ fontSize:13, color:c.textSecondary }}>Manage your account settings and personal information.</p>
      </div>
      <div style={{ maxWidth:580 }}>
        <div style={{ ...GLASS.surface, borderRadius:16, padding:24, marginBottom:14, position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:0, left:'8%', right:'8%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)', pointerEvents:'none' }} />
          <div style={{ display:'flex', alignItems:'center', gap:20, flexWrap:'wrap' }}>
            <div style={{ width:72, height:72, borderRadius:'50%', background:'conic-gradient(from 135deg,#60A5FA,#A78BFA,#FF6B9D,#60A5FA)', padding:2.5, flexShrink:0 }}>
              <div style={{ width:'100%', height:'100%', borderRadius:'50%', background:'linear-gradient(135deg,#1a1035,#0d1a30)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:700, color:'#F8F8FF', letterSpacing:'0.04em', fontFamily:'Sora,sans-serif' }}>{user.initials}</div>
            </div>
            <div>
              <div style={{ fontSize:18, fontWeight:600, color:c.textPrimary, letterSpacing:'-0.02em', marginBottom:4, fontFamily:'Sora,sans-serif' }}>{user.name}</div>
              <div style={{ fontSize:13, color:c.textSecondary, marginBottom:5, display:'flex', alignItems:'center', gap:6 }}><Icon name="mail" size={12} color={c.textSecondary}/>{user.email}</div>
              {user.joinedAt&&<div style={{ fontSize:12, color:c.textSecondary, display:'flex', alignItems:'center', gap:6 }}><Icon name="clock" size={12} color={c.textSecondary}/>Joined {user.joinedAt}</div>}
            </div>
          </div>
          {user.bio&&<p style={{ marginTop:16, paddingTop:16, borderTop:'1px solid rgba(255,255,255,0.08)', fontSize:13, color:c.textSecondary, lineHeight:1.72 }}>{user.bio}</p>}
        </div>

        <div style={{ ...GLASS.surface, borderRadius:16, padding:24, marginBottom:14, position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:0, left:'8%', right:'8%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)', pointerEvents:'none' }} />
          <h2 style={{ fontSize:15, fontWeight:600, color:c.textPrimary, marginBottom:20 }}>Edit Profile</h2>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <FormInput label="Full Name" value={form.name} onChange={v=>set('name',v)} placeholder="Your full name" />
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              <label style={{ fontSize:12, color:c.textSecondary, fontWeight:500, display:'flex', alignItems:'center', gap:7 }}>
                Email address
                <span style={{ fontSize:11, color:'rgba(248,248,255,0.3)', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:4, padding:'1px 7px' }}>read-only</span>
              </label>
              <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:8, padding:'10px 13px', color:'rgba(248,248,255,0.35)', fontSize:14, display:'flex', alignItems:'center', gap:9 }}>
                <Icon name="lock" size={13} color="rgba(248,248,255,0.25)"/>{user.email}
              </div>
            </div>
            <FormTextarea label="Bio" value={form.bio} onChange={v=>set('bio',v)} placeholder="Tell your team a bit about yourself…" rows={3} />
          </div>
          <div style={{ marginTop:20, display:'flex', alignItems:'center', justifyContent:'flex-end', gap:12 }}>
            {saved&&<div style={{ display:'flex', alignItems:'center', gap:6, color:c.success, fontSize:13, animation:'fadeIn 0.2s ease' }}><Icon name="check" size={14} color={c.success}/>Saved</div>}
            <Btn variant="primary" loading={loading} onClick={handleSave}>{loading?'Saving…':'Save Changes'}</Btn>
          </div>
        </div>

        <div style={{ ...GLASS.surface, border:'1px solid rgba(255,107,107,0.28)', borderRadius:16, padding:22, position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:0, left:'15%', right:'15%', height:1, background:'linear-gradient(90deg,transparent,rgba(255,107,107,0.4),transparent)', pointerEvents:'none' }} />
          <h3 style={{ fontSize:13, fontWeight:600, color:c.danger, marginBottom:8 }}>Danger Zone</h3>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, flexWrap:'wrap' }}>
            <p style={{ fontSize:13, color:c.textSecondary, lineHeight:1.6 }}>Permanently delete your account and all associated data.</p>
            <Btn variant="danger" size="sm" style={{ flexShrink:0 }}>Delete Account</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   APP ROOT
───────────────────────────────────────── */
function App() {
  const [page, setPage]           = React.useState('checking');
  const [projects, setProjects]   = React.useState([]);
  const [user, setUser]           = React.useState(null);
  const [sidebarCollapsed, setSC] = React.useState(false);
  const [authModal, setAuthModal] = React.useState(null); // 'login'|'register'|'forgot'|null

  React.useEffect(() => {
    api('GET', '/auth/current-user')
      .then(data => { setUser(toUserShape(data)); loadProjects(); setPage('dashboard'); })
      .catch(() => setPage('landing'));
  }, []);

  const openAuth  = mode => setAuthModal(mode || 'login');
  const closeAuth = () => setAuthModal(null);

  const loadProjects = () => {
    api('GET', '/projects')
      .then(data => setProjects((data||[]).map(toProjectShape)))
      .catch(() => {});
  };

  const navigate = p => {
    // intercept auth routes → open modal instead of full-page route
    if (p === 'login' || p === 'register') { openAuth(p); return; }
    if (p === 'projects' && user) loadProjects();
    setPage(p);
  };

  const onLogin = userData => {
    setUser(userData);
    loadProjects();
    closeAuth();
    setPage('dashboard');
  };

  const onLogout = async () => {
    try { await api('POST', '/auth/logout'); } catch(_) {}
    setUser(null); setProjects([]); setPage('landing');
  };

  const appPages = ['dashboard','projects','profile'];

  if (page==='checking') {
    return (
      <>
        <GlassBg />
        <div style={{ position:'relative', zIndex:1, height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" strokeWidth="2.5" style={{animation:'spin 0.8s linear infinite'}}><path d="M12 3a9 9 0 0 1 9 9"/><path d="M21 12a9 9 0 01-9 9M3 12a9 9 0 019-9" strokeOpacity="0.3"/></svg>
            <span style={{ color:'rgba(248,248,255,0.4)', fontSize:13 }}>Loading…</span>
          </div>
        </div>
      </>
    );
  }

  return (
    <ThemeContext.Provider value={C}>
      <GlassBg />
      <div style={{ position:'relative', zIndex:1, height:'100%' }}>
        {page==='landing' && <LandingPage navigate={navigate} openAuth={openAuth} />}
        {appPages.includes(page) && (
          <AppLayout page={page} navigate={navigate} user={user} sidebarCollapsed={sidebarCollapsed} setSidebarCollapsed={setSC} onLogout={onLogout} openAuth={openAuth}>
            {page==='dashboard' && <DashboardPage projects={projects} navigate={navigate} user={user} openAuth={openAuth} />}
            {page==='projects'  && <ProjectsPage  projects={projects} setProjects={setProjects} user={user} openAuth={openAuth} />}
            {page==='profile'   && (user ? <ProfilePage user={user} setUser={setUser} /> : (
              <div style={{ padding:40, textAlign:'center', color:'rgba(248,248,255,0.5)', fontSize:14 }}>
                <p style={{ marginBottom:16 }}>Sign in to view your profile.</p>
                <Btn variant="primary" onClick={()=>openAuth('login')}>Sign in</Btn>
              </div>
            ))}
          </AppLayout>
        )}
        {authModal && <AuthModal mode={authModal} setMode={setAuthModal} onLogin={onLogin} onClose={closeAuth} />}
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
